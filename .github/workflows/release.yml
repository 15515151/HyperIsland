name: Auto Build & Release from Upstream

# 触发条件
on:
  # 定时任务：每小时检查一次主仓库是否有更新（时间为 UTC，可根据需要调整）
  schedule:
    - cron: '0 * * * *'
  # 手动触发：用于异常情况或想要强制打包时
  workflow_dispatch:
    inputs:
      version:
        description: '覆盖版本号（格式：1.5.0，留空则自动读取）'
        required: false
        type: string
      build_only:
        description: '仅构建不发布'
        required: false
        type: boolean
        default: false

jobs:
  # =======================================================
  # Job 1: 检查版本更新
  # =======================================================
  check_update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version.outputs.should_build }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - name: Checkout upstream pubspec.yaml
        uses: actions/checkout@v4.2.2
        with:
          repository: '1812z/HyperIsland'
          ref: 'main'
          # 仅拉取 pubspec.yaml 文件，极大加快检查速度
          sparse-checkout: 'pubspec.yaml'
          sparse-checkout-cone-mode: false

      - name: Detect version and compare
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 解析主仓库 pubspec.yaml 中的版本号
          CURRENT_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo "$CURRENT_FULL" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT_FULL" | cut -d'+' -f2)

          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=${INPUT_VERSION:-$VERSION_NAME}

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          # 2. 获取当前仓库最新的 Release 版本（用于生成 Changelog 对比）
          LATEST_RELEASE=$(gh release list --repo ${{ github.repository }} --limit 1 | awk '{print $1}' || echo "")
          PREVIOUS_VERSION=${LATEST_RELEASE#v} # 去除 v 前缀
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

          # 3. 判断是否需要构建
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
             echo "::notice::手动触发，强制启动构建流程。"
             echo "should_build=true" >> $GITHUB_OUTPUT
          else
             # 检查你的仓库中是否已经发布过这个版本
             if gh release view "v$VERSION_NAME" --repo ${{ github.repository }} > /dev/null 2>&1; then
               echo "::notice::主仓库版本 v$VERSION_NAME 已在当前仓库发布过，跳过构建。"
               echo "should_build=false" >> $GITHUB_OUTPUT
             else
               echo "::notice::检测到主仓库更新了新版本 v$VERSION_NAME，准备开始构建！"
               echo "should_build=true" >> $GITHUB_OUTPUT
             fi
          fi

  # =======================================================
  # Job 2: 构建和发布
  # =======================================================
  build_and_release:
    needs: check_update
    # 仅当检查作业判定需要构建时才执行
    if: needs.check_update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 第一步：完整检出主仓库代码
      - name: Checkout upstream repository
        uses: actions/checkout@v4.2.2
        with:
          repository: '1812z/HyperIsland'
          ref: 'main'
          fetch-depth: 0 # 获取所有历史，方便生成基于 commit 的更新日志

      # 第二步：安装 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4.3.0
        with:
          java-version: '21'
          distribution: 'temurin'

      # 第三步：安装 Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.41.6'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          pub-cache-key: 'flutter-pub-:os:-:channel:-:version:-:arch:-:hash:'
          
      # 第五步：设置 Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.1.0
        with:
          gradle-version: wrapper
          cache-disabled: false

      # 第六步：安装 Flutter 依赖
      - name: Install dependencies
        run: flutter pub get --offline || flutter pub get

      # 第七步：解码签名密钥
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      # 第八步：编译 APK
      - name: Build APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-name="${{ needs.check_update.outputs.version_name }}" \
            --build-number="${{ needs.check_update.outputs.version_code }}"

      # 第九步：上传 APK 为构件
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: HyperIsland-v${{ needs.check_update.outputs.version_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          compression-level: 0

      # 第十步：重命名 APK
      - name: Rename APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk"

      # 第十一步：提取更新日志
      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ needs.check_update.outputs.version_name }}"
          $previousVersion = "${{ needs.check_update.outputs.previous_version }}"
          $changelogContent = ""

          # 从 CHANGELOG.md 提取
          try {
            if (Test-Path 'CHANGELOG.md') {
              $changelogFile = Get-Content 'CHANGELOG.md' -Raw
              $escapedVersion = [regex]::Escape($version)
              $pattern = "(?ms)^#\s*V$escapedVersion\b[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\b|\Z)"
              $match = [regex]::Match($changelogFile, $pattern)
              
              if (-not $match.Success) {
                $pattern = "(?ms)^#\s*V$escapedVersion\s*\([\d-]+\)[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\s*\(|\Z)"
                $match = [regex]::Match($changelogFile, $pattern)
              }
              
              if ($match.Success) {
                $section = $match.Value.Trim()
                $lines = $section -split "`n"
                if ($lines.Length -gt 1) {
                  $body = ($lines | Select-Object -Skip 1) -join "`n"
                } else {
                  $body = $section
                }
                $body = $body.Trim()
                if ($body) {
                  echo "已从主仓库 CHANGELOG.md 提取更新内容"
                  $changelogContent = $body
                }
              }
            }
          } catch {
            echo "提取 CHANGELOG 失败: $_"
          }

          # 兜底：使用 git 提交记录
          if (-not $changelogContent) {
            echo "使用 Git 提交记录生成"
            $commitLog = ""
            if ($previousVersion -ne "") {
              # 获取两次 Release 之间的提交记录
              $commitLog = git log "v$previousVersion"..HEAD --pretty=format:"- %s" 2>$null
            }
            if (-not $commitLog) {
              $commitLog = git log --pretty=format:"- %s" -15 2>$null
            }
            $changelogContent = "### 变更日志`n`n$commitLog"
          }

          echo "content<<EOF" >> $env:GITHUB_OUTPUT
          echo "$changelogContent" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      # 第十二步：创建 GitHub Release（仅在非 build_only 时执行）
      - name: Create GitHub Release
        if: ${{ github.event.inputs.build_only != 'true' }}
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: v${{ needs.check_update.outputs.version_name }}
          name: HyperIsland v${{ needs.check_update.outputs.version_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk
          draft: false
          prerelease: false
