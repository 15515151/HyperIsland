name: Sync & Build Upstream

# 触发条件
on:
  # 定时任务：每隔 6 小时执行一次检查 (分钟 小时 日 月 星期)
  # 你可以根据需要修改，例如 '0 0 * * *' 为每天一次
  schedule:
    - cron: '0 */1 * * *'
  # 手动触发：允许手动强制执行构建
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制拉取构建并发布 (忽略版本对比)'
        required: false
        type: boolean
        default: false

jobs:
  # 第一阶段：检测主仓库版本是否有更新
  check_update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      version_name: ${{ steps.compare.outputs.version_name }}
      version_code: ${{ steps.compare.outputs.version_code }}
    steps:
      - name: Check upstream version
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 获取主仓库的 pubspec.yaml 并提取版本号
          UPSTREAM_URL="https://raw.githubusercontent.com/1812z/HyperIsland/main/pubspec.yaml"
          HTTP_STATUS=$(curl -s -o upstream_pubspec.yaml -w "%{http_code}" $UPSTREAM_URL)
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::无法获取主仓库的 pubspec.yaml"
            exit 1
          fi
          
          UPSTREAM_FULL=$(grep '^version:' upstream_pubspec.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
          UPSTREAM_NAME=$(echo "$UPSTREAM_FULL" | cut -d'+' -f1)
          UPSTREAM_CODE=$(echo "$UPSTREAM_FULL" | cut -d'+' -f2)
          echo "::notice::主仓库检测到版本: $UPSTREAM_NAME ($UPSTREAM_CODE)"

          # 2. 获取当前仓库的最新 Release 标签 (例如 v1.5.0)
          # 如果当前仓库还没有发布过任何 Release，则默认返回 v0.0.0
          CURRENT_LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq .tag_name 2>/dev/null || echo "v0.0.0")
          CURRENT_LATEST_NAME=${CURRENT_LATEST_TAG#v} # 移除 'v' 前缀
          echo "::notice::当前仓库最新发布的版本: $CURRENT_LATEST_NAME"

          # 3. 对比版本并决定是否构建
          SHOULD_BUILD="false"
          if [ "$UPSTREAM_NAME" != "$CURRENT_LATEST_NAME" ]; then
            SHOULD_BUILD="true"
            echo "::notice::发现新版本！准备从 $CURRENT_LATEST_NAME 升级到 $UPSTREAM_NAME"
          else
            echo "::notice::版本未变更，跳过构建。"
          fi

          # 如果是手动触发且勾选了强制构建
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "::notice::已启用强制构建模式。"
          fi

          # 4. 输出变量供下一个 Job 使用
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "version_name=$UPSTREAM_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$UPSTREAM_CODE" >> $GITHUB_OUTPUT

  # 第二阶段：如果检测到更新，则拉取主仓库代码并编译发布
  build_and_release:
    needs: check_update
    if: needs.check_update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 第一步：检出主仓库 (1812z/HyperIsland) 的代码，而不是当前仓库
      - name: Checkout Upstream Repository
        uses: actions/checkout@v4.2.2
        with:
          repository: '1812z/HyperIsland'
          ref: 'main'
          fetch-depth: 0 # 获取完整历史以生成 changelog

      # 第二步：安装 Java 环境
      - name: Set up Java
        uses: actions/setup-java@v4.3.0
        with:
          java-version: '21'
          distribution: 'temurin'

      # 第三步：安装 Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.41.6'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          pub-cache-key: 'flutter-pub-:os:-:channel:-:version:-:arch:-:hash:'

      # 第四步：设置 Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.1.0
        with:
          gradle-version: wrapper
          cache-disabled: false

      # 第五步：安装 Flutter 依赖
      - name: Install dependencies
        run: flutter pub get --offline || flutter pub get

      # 第六步：解码签名密钥
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      # 第七步：编译 APK
      - name: Build APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-name="${{ needs.check_update.outputs.version_name }}" \
            --build-number="${{ needs.check_update.outputs.version_code }}"

      # 第八步：上传 APK 作为工件
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: HyperIsland-v${{ needs.check_update.outputs.version_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          compression-level: 0

      # 第九步：重命名 APK 文件
      - name: Rename APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk"

      # 第十步：提取更新日志 (从主仓库的提交记录或 CHANGELOG.md 中提取)
      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ needs.check_update.outputs.version_name }}"
          $changelogContent = ""

          try {
            if (Test-Path 'CHANGELOG.md') {
              $changelogFile = Get-Content 'CHANGELOG.md' -Raw
              $escapedVersion = [regex]::Escape($version)
              $pattern = "(?ms)^#\s*V$escapedVersion\b[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\b|\Z)"
              $match = [regex]::Match($changelogFile, $pattern)

              if (-not $match.Success) {
                $pattern = "(?ms)^#\s*V$escapedVersion\s*\([\d-]+\)[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\s*\(|\Z)"
                $match = [regex]::Match($changelogFile, $pattern)
              }

              if ($match.Success) {
                $section = $match.Value.Trim()
                $lines = $section -split "`n"
                if ($lines.Length -gt 1) {
                  $body = ($lines | Select-Object -Skip 1) -join "`n"
                } else {
                  $body = $section
                }
                $body = $body.Trim()
                if ($body) {
                  $changelogContent = $body
                }
              }
            }
          } catch {}

          if (-not $changelogContent) {
            # 如果没提取到，默认获取主仓库最近的 15 条提交记录
            $commits = git log --pretty=format:"- %s" -15 2>$null
            $changelogContent = "### 主仓库最新变更同步`n`n$commits"
          }

          echo "content<<EOF" >> $env:GITHUB_OUTPUT
          echo "$changelogContent" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      # 第十一步：在你当前的仓库创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: v${{ needs.check_update.outputs.version_name }}
          name: HyperIsland v${{ needs.check_update.outputs.version_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: HyperIsland-v${{ needs.check_update.outputs.version_name }}.apk
          draft: false
          prerelease: false
